name: Deploy Cloud Run Job

# This pipeline triggers every time when push code to the 'main' branch
on:
  push:
    branches:
      - main

env:
  PROJECT_ID: valor-sales
  REGION: us-east1
  JOB_NAME: shopify-customer-sync
  # The service account the Job will use when executing in GCP
  RUNNER_SA: "valor-scheduler-invoker@valor-sales.iam.gserviceaccount.com"

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy Cloud Run Job
        # This mirrors your deploy.sh script exactly
        run: |
          gcloud run jobs deploy ${{ env.JOB_NAME }} \
            --source . \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --service-account ${{ env.RUNNER_SA }} \
            --set-env-vars GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }} \
            --set-secrets SHOPIFY_STORE_PASSWORD=stlth_shopify_cred:latest \
            --max-retries 1 \
            --task-timeout 10m